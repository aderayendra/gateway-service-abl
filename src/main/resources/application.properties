spring.application.name=gateway-service

spring.cloud.gateway.routes[0].id=PRODUCT-SERVICE
spring.cloud.gateway.routes[0].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/produkgit/**

spring.cloud.gateway.routes[1].id=ORDER-SERVICE
spring.cloud.gateway.routes[1].uri=lb://ORDER-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/order/**

#spring.cloud.gateway.routes[2].id=PELANGGAN-SERVICE
#spring.cloud.gateway.routes[2].uri=lb://PELANGGAN-SERVICE
#spring.cloud.gateway.routes[2].predicates[0]=Path=/api/customer/**

server.port=8082

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.hostname=localhost
